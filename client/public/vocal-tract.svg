  <g id="teeth_lower" class="voiceray-anim-layer"></g>
  <g id="lips_upper" class="voiceray-anim-layer"></g>
  <g id="lips_lower" class="voiceray-anim-layer"></g>
  <g id="tongue" class="voiceray-anim-layer"></g>
